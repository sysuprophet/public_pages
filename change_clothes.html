<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI换装</title>
    <!-- 【新增】引入微信 SDK，用于检测小程序环境及跳转 -->
    <script type="text/javascript" src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        /* 此处保持你原来的 CSS 不变 */
        :root {
            --primary-color: #84705f; 
            --title-color: #4a423a;   
            --desc-color: #888888;    
            --border-color: #eeeeee;
            --bg-gradient: linear-gradient(135deg, #FAFAF8 0%, #FFFFFF 50%, #F9F8F6 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: "PingFang SC", "STHeiti", sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 5px 12px 100px 12px;
            color: var(--title-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .header { text-align: center; margin: 5px 0 10px 0; }
        .header h1 { font-size: 20px; letter-spacing: 4px; margin: 0; color: var(--title-color); font-weight: bold; }
        .header p { font-size: 12px; color: var(--desc-color); margin-top: 2px; position: relative; display: inline-block; }
        .header p::before, .header p::after { content: ""; position: absolute; top: 50%; width: 25px; height: 1px; background: #e0e0e0; }
        .header p::before { left: -35px; } .header p::after { right: -35px; }
        .steps-container {
            background: #fff; width: 100%; border-radius: 12px;
            padding: 8px 5px; display: flex; justify-content: space-around;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02); margin-bottom: 8px;
        }
        .step-box { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
        .step-circle { 
            width: 24px; height: 24px; background: var(--primary-color); color: #fff; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 12px; font-weight: bold; margin-bottom: 2px;
        }
        .step-box:not(:last-child)::after {
            content: ""; position: absolute; top: 12px; left: calc(50% + 15px);
            width: calc(100% - 30px); height: 1px; background: #f0f0f0;
        }
        .step-label { font-size: 11px; color: #666; transform: scale(0.95); }
        .card {
            background: #fff; width: 100%; border-radius: 15px;
            padding: 12px 15px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
        .card-desc { font-size: 11px; color: var(--desc-color); margin-bottom: 10px; line-height: 1.3; }
        .upload-area-wrapper { display: flex; justify-content: center; width: 100%; }
        .upload-area {
            width: 130px; 
            aspect-ratio: 9 / 16;
            border: 1px solid var(--border-color); border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden; background: #fff;
        }
        .upload-area.large { width: 155px; }
        .icon-circle {
            width: 40px; height: 40px; border: 1px solid #cccccc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .icon-circle svg { width: 18px; height: 18px; fill: #999; }
        .upload-text-main { font-size: 12px; color: #333; font-weight: bold; margin-bottom: 2px; text-align: center; }
        .upload-text-sub { font-size: 10px; color: #999; text-align: center; }
        .upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
        .tab-item {
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color);
            background: #fff; font-size: 12px; font-weight: bold; color: var(--title-color);
            transition: 0.3s; text-align: center;
        }
        .tab-item.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .scroll-wrapper { max-height: 280px; overflow-y: auto; padding: 2px; }
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-item { aspect-ratio: 3/4; border-radius: 10px; overflow: hidden; position: relative; border: 2px solid transparent; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item.active { border-color: var(--primary-color); }
        .grid-item.active::after {
            content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: var(--primary-color); width: 20px; height: 20px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px;
        }
        .footer-action {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            padding: 10px 15px 20px 15px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .btn-generate {
            width: 100%; height: 48px; background: var(--primary-color);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(132, 112, 95, 0.3);
        }
        .loading-mask { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .loader { width: 34px; height: 34px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #cropOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none; flex-direction: column; 
        }
        .crop-container {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;
            background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                              linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1a1a1a 75%), 
                              linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
        }
        #cropImg { display: block; max-width: 100%; }
        .crop-footer { height: 80px; display: flex; justify-content: space-around; align-items: center; background: #000; padding-bottom: env(safe-area-inset-bottom); }
        .btn-crop { background: #333; color: #fff; border: none; padding: 10px 35px; border-radius: 25px; font-weight: bold; font-size: 14px; }
        .btn-crop.main { background: var(--primary-color); }
        #presetView, #customView { display: none; }
        #presetView.active, #customView.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>一 键 换 装</h1>
        <p>专业形象 即刻呈现</p>
    </div>

    <div class="steps-container">
        <div class="step-box"><div class="step-circle">1</div><div class="step-label">上传照片</div></div>
        <div class="step-box"><div class="step-circle">2</div><div class="step-label">选择服装</div></div>
        <div class="step-box"><div class="step-circle">3</div><div class="step-label">生成换装照</div></div>
    </div>

    <div class="card">
        <div class="card-title">第一步：上传人物照片</div>
        <div class="card-desc">上传清晰正面照片，效果更佳</div>
        <div class="upload-area-wrapper">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="personPlaceholder" style="display: flex; flex-direction: column; align-items: center;">
                    <div class="icon-circle">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </div>
                    <div class="upload-text-main">点击上传照片</div>
                    <div class="upload-text-sub">支持JPG、PNG格式</div>
                </div>
                <img id="personPreview" style="display: none;">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">第二步：选择服装方式</div>
        <div class="tabs">
            <div class="tab-item active" onclick="switchView('preset')">选择预设服装</div>
            <div class="tab-item" onclick="switchView('custom')">上传参考服装照</div>
        </div>
        <div id="presetView" class="active">
            <div class="scroll-wrapper">
                <div class="grid-layout" id="modelGrid"></div>
            </div>
        </div>
        <div id="customView">
            <div class="upload-area-wrapper">
                <div class="upload-area large" onclick="document.getElementById('garmentInput').click()">
                    <div id="garmentPlaceholder" style="display: flex; flex-direction: column; align-items: center;">
                        <div class="icon-circle">
                            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                        </div>
                        <div class="upload-text-main">上传服装照片</div>
                        <div class="upload-text-sub">模特图或单品图均可</div>
                    </div>
                    <img id="garmentPreview" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-generate" onclick="startSwap()">立 即 生 成 换 装 照</button>
    </div>

    <div class="loading-mask" id="loadingMask">
        <div class="loader"></div>
        <p style="margin-top: 15px; color: var(--primary-color); font-weight:bold; font-size:13px;">AI 正在生成，请耐心等待...</p>
    </div>

    <div id="cropOverlay">
        <div class="crop-container"><img id="cropImg"></div>
        <div class="crop-footer">
            <button class="btn-crop" onclick="cancelCrop()">重 选</button>
            <button class="btn-crop main" onclick="confirmCrop()">确 定</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)">
    <input type="file" id="garmentInput" accept="image/*" style="display: none;" onchange="handleGarmentFile(this)">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const baseUrl = "https://avatar-video.oss-cn-shenzhen.aliyuncs.com/ref_images/";
        const models = [
			"xinchun_image_1.jpg", "xinchun_image_2.jpg", "xinchun_image_3.jpg",
            "xinchun_image_4.jpg", "xinchun_image_5.jpg", "xinchun_image_6.jpg",
            "xinchun_image_7.jpg", "xinchun_image_8.jpg", "xinchun_image_9.jpg",
            "xizhuang_image_1.jpg", "xizhuang_image_2.jpg", "xizhuang_image_3.jpg",
            "xizhuang_image_4.jpg", "xizhuang_image_5.jpg", "xizhuang_image_6.jpg",
            "xizhuang_image_7.jpg", "xizhuang_image_8.jpg", "xizhuang_image_9.jpg",
            "xizhuang_image_10.jpg", "xizhuang_image_11.jpg", "dayi_image_1.jpg",
            "dayi_image_2.jpg", "dayi_image_3.jpg", "dayi_image_4.jpg",
            "dayi_image_5.jpg", "dayi_image_6.jpg", "lianyiqun_image_1.jpg",
            "lianyiqun_image_2.jpg", "lianyiqun_image_3.jpg", "lianyiqun_image_4.jpg",
            "lianyiqun_image_5.jpg", "lianyiqun_image_6.jpg"
        ].map(name => baseUrl + name);

        let selectedFileBlob = null;
        let selectedModelUrl = models[0];
        let customGarmentFile = null;
        let isCustomMode = false;
        let cropper = null;

        const grid = document.getElementById('modelGrid');
        models.forEach((url, index) => {
            const div = document.createElement('div');
            div.className = `grid-item ${index === 0 ? 'active' : ''}`;
            div.innerHTML = `<img src="${url}">`;
            div.onclick = () => {
                document.querySelectorAll('.grid-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                selectedModelUrl = url;
            };
            grid.appendChild(div);
        });

        function switchView(type) {
            const tabs = document.querySelectorAll('.tab-item');
            const v1 = document.getElementById('presetView');
            const v2 = document.getElementById('customView');
            if(type === 'preset') {
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
                v1.classList.add('active'); v2.classList.remove('active');
                isCustomMode = false;
            } else {
                tabs[1].classList.add('active'); tabs[0].classList.remove('active');
                v2.classList.add('active'); v1.classList.remove('active');
                isCustomMode = true;
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('cropImg').src = e.target.result;
                document.getElementById('cropOverlay').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropImg'), { 
                    aspectRatio: 9/16, viewMode: 1, autoCropArea: 1, dragMode: 'move', background: false
                });
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function confirmCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 720, height: 1280 });
            canvas.toBlob((blob) => {
                selectedFileBlob = blob;
                const preview = document.getElementById('personPreview');
                preview.src = canvas.toDataURL('image/jpeg');
                preview.style.display = 'block';
                document.getElementById('personPlaceholder').style.display = 'none';
                document.getElementById('cropOverlay').style.display = 'none';
            }, 'image/jpeg', 0.9);
        }

        function cancelCrop() { 
            document.getElementById('cropOverlay').style.display = 'none'; 
            if(cropper) cropper.destroy();
        }

        function handleGarmentFile(input) {
            const file = input.files[0];
            if (file) {
                customGarmentFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('garmentPreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('garmentPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
            input.value = ''; 
        }

        // --- 业务代码修改部分 ---

        /**
         * 【核心修改点】
         * 点击“立即生成换装照”时调用的主逻辑
         */
         async function startSwap() {
            // 1. 基础校验
            if (!selectedFileBlob) { alert("请先上传照片"); return; }
            if (isCustomMode && !customGarmentFile) { alert("请上传参考服装图片"); return; }
            
            // 2. 环境检测：检测是否在微信小程序环境
            const isMiniProgram = window.__wxjs_environment === 'miniprogram' || /miniProgram/i.test(navigator.userAgent);

            document.getElementById('loadingMask').style.display = 'flex';
            
            try {
                // 3. 执行共同的上传逻辑：获取签名并上传到 OSS
                const ossParams = await getOSSSignature();
                const userUrl = await uploadToOSS(selectedFileBlob, ossParams, 'user.jpg');
                
                let refUrl = selectedModelUrl;
                if (isCustomMode) {
                    const gParams = await getOSSSignature();
                    refUrl = await uploadToOSS(customGarmentFile, gParams, 'garment.jpg');
                }
                
                // 4. 向后端发送换装请求
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');
                const submitRes = await fetch('https://mend.idea.edu.cn/insight/api/circle/v1/mkt-creation/task/submit?appId=bkCircle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ 
                        creationName: 'changeClothes', 
                        reqParams: { userImageUrl: userUrl, refImageUrl: refUrl } 
                    })
                });
                
                const subResult = await submitRes.json();

                // 5. 请求发送成功后的逻辑分支
                if (subResult.code === 200) {
                    if (isMiniProgram) {
                        // 情况 A：小程序环境 -> 跳转到作品列表页面
                        console.log("检测到小程序环境，提交成功，准备跳转...");
                        setTimeout(() => {
                            document.getElementById('loadingMask').style.display = 'none';
                            wx.miniProgram.redirectTo({
                                url: '/pages/work_list/work_list'
                            });
                        }, 500); // 稍微延迟增加体感稳定性
                    } else {
                        // 情况 B：非小程序环境 -> 保持原有逻辑，开始轮询结果
                        pollForResult(subResult.data.creationId);
                    }
                } else {
                    throw new Error(subResult.msg);
                }
                
            } catch (e) {
                console.error(e);
                alert("服务繁忙，请稍后重试");
                document.getElementById('loadingMask').style.display = 'none';
            }
        }

        // 原有的 OSS 获取签名、上传及轮询逻辑保持不变
        async function getOSSSignature() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const res = await fetch('https://mend.idea.edu.cn/insight/api/circle/v1/oss/signature/generation?appId=bkCircle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            return result.data;
        }

        async function uploadToOSS(fileBlob, ossParams, fileName) {
            const objectKey = `${ossParams.seq}_${Date.now()}_${fileName}`;
            const formData = new FormData();
            formData.append('key', objectKey);
            formData.append('policy', ossParams.policy);
            formData.append('x-oss-signature', ossParams.signature);
            formData.append('x-oss-date', ossParams.x_oss_date);
            formData.append('x-oss-credential', ossParams.x_oss_credential);
            formData.append('x-oss-signature-version', ossParams.x_oss_signature_version);
            formData.append('x-oss-security-token', ossParams.security_token);
            formData.append('file', fileBlob);
            await fetch(ossParams.host, { method: 'POST', body: formData });
            return `${ossParams.host}/${objectKey}`;
        }

        async function pollForResult(creationId) {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            try {
                const res = await fetch('https://mend.idea.edu.cn/insight/api/v1/mkt-creation/task/result?appId=bkCircle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ creationName: 'changeClothes', creationId: creationId })
                });
                const result = await res.json();
                const picUrl = result.data?.picture_url || result.data?.result_url;
                if (picUrl) {
                    document.getElementById('personPreview').src = picUrl;
                    document.getElementById('personPreview').onload = () => {
                        document.getElementById('loadingMask').style.display = 'none';
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                } else { setTimeout(() => pollForResult(creationId), 3000); }
            } catch (e) { setTimeout(() => pollForResult(creationId), 3000); }
        }
    </script>
</body>
</html>
